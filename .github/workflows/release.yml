name: Release

# Fires on v*.*.* tag push only. Builds the byo-relay image (with the SPA
# bundle embedded in /dist), pushes it to ghcr.io/wattzupbyte/wattcloud,
# KEYLESS-signs it with sigstore/cosign, and writes the resulting @sha256:...
# digest + the signed-identity claim into the GitHub Release body so the VPS
# operator can `cosign verify` before pull.
#
# Deploy is deliberately manual — we do NOT ssh into the VPS from Actions.
# Every roll-out is hand-signed by the operator.
#
# Security model
# --------------
# The release image on GHCR is PUBLIC (anonymous pull). Integrity is not
# provided by registry access control — it's provided by the cosign signature:
#   - Signed keylessly from *this* Actions workflow via OIDC → Sigstore Fulcio
#     (no long-lived signing secret; certificate issued per-workflow-run).
#   - Transparency logged to Rekor so revocation + exfiltration of a valid
#     signature is observable.
#   - scripts/update.sh on the VPS runs `cosign verify` with a hard-coded
#     certificate-identity-regexp = this repo's release.yml @ refs/tags/v*
#     before `docker compose pull`. A swap on the registry side therefore
#     cannot roll forward: the signature check fails and update.sh aborts.
#
# Workflow-injection notes
# ------------------------
# - All third-party actions pinned by commit SHA; dependabot.yml tracks the
#   version tags they correspond to.
# - `run:` steps consume only github.ref_name (validated by strict semver
#   regex before shell use) and the immutable @sha256 digest emitted by
#   docker/build-push-action. No issue titles, PR bodies, comment bodies,
#   or commit messages are interpolated into shell — those are the classic
#   injection surfaces and are absent from this file.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write    # create the GitHub Release
  packages: write    # push image to GHCR
  id-token: write    # OIDC token for keyless cosign signing

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/wattzupbyte/wattcloud
  REF_NAME: ${{ github.ref_name }}

jobs:
  build-and-push:
    name: Build + push + sign + digest
    runs-on: ubuntu-22.04
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - name: Validate tag matches semver
        run: |
          if ! printf '%s' "$REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "::error::tag $REF_NAME does not match v<maj>.<min>.<patch>[-prerelease]" >&2
            exit 1
          fi

      # Build the WASM + SPA first so the resulting dist/ can be copied into
      # byo-relay's Docker context. The Dockerfile is byo-relay-centric
      # (context = byo-relay/, expects dist/ next to Cargo.toml), so we
      # stage the bundle under byo-relay/dist/ before docker build.

      # dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@c5a29ddb4d9d194e7c84ec8c3fba61b1c31fee8a
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      # Swatinem/rust-cache@v2.7.3
      - uses: Swatinem/rust-cache@23bce251a8cd2ffc3c1075eaa2367cf899916d84

      # actions/setup-node@v4.0.4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh -s -- --version 0.12.1

      - name: wasm-pack build (sdk-wasm)
        run: wasm-pack build sdk/sdk-wasm --release --target web --out-dir ../../frontend/src/pkg --out-name wattcloud_sdk_wasm

      - name: Build frontend into byo-relay/dist/
        working-directory: frontend
        run: |
          npm ci
          # package.json's build script already emits to ../byo-relay/dist.
          npm run build

      # docker/setup-buildx-action@v3.6.1
      - name: Set up Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db

      # docker/login-action@v3.3.0 — push needs auth, but the resulting image
      # is public and pullable without credentials.
      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        id: push
        # docker/build-push-action@v6.7.0
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85
        with:
          context: byo-relay
          file: byo-relay/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.REF_NAME }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.REF_NAME }}
          provenance: true
          sbom: true

      # sigstore/cosign-installer@v3.7.0 — pins cosign binary version 2.4.1,
      # the matching release. Installs to $PATH.
      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da
        with:
          cosign-release: 'v2.4.1'

      - name: Keyless-sign image with cosign
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        # --yes is the official v2 flag to skip the interactive confirm. The
        # deprecated COSIGN_EXPERIMENTAL env var + absence of --yes would hang
        # in a non-TTY CI environment.
        run: cosign sign --yes "${IMAGE_NAME}@${DIGEST}"

      - name: Write release notes
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          {
            echo "## Wattcloud $REF_NAME"
            echo
            echo "### Container image"
            echo
            echo '```'
            echo "${IMAGE_NAME}@${DIGEST}"
            echo '```'
            echo
            echo "### Roll-out on VPS"
            echo
            echo "On the VPS, verify the cosign signature then roll forward:"
            echo
            echo '```bash'
            echo "./scripts/update.sh ${IMAGE_NAME}@${DIGEST}"
            echo '```'
            echo
            echo "The script runs \`cosign verify\` with identity"
            echo "\`https://github.com/wattzupbyte/wattcloud/.github/workflows/release.yml@refs/tags/$REF_NAME\`"
            echo "and issuer \`https://token.actions.githubusercontent.com\` — a"
            echo "tampered image at the registry will cause \`update.sh\` to abort."
            echo
            echo "### Changes"
            echo
            # git log output is static text written to a markdown body; it is
            # not interpolated into any later shell command.
            PREV_TAG=$(git tag --sort=-creatordate | grep -v "^$REF_NAME$" | head -n 1 || true)
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:'- %s (%h)' "$PREV_TAG..$REF_NAME"
            else
              git log --pretty=format:'- %s (%h)' HEAD
            fi
          } > RELEASE_NOTES.md

      # softprops/action-gh-release@v2.0.8
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          tag_name: ${{ env.REF_NAME }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
