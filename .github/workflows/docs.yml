name: Docs

# Build and deploy the operator handbook (docs/) to GitHub Pages.
# Triggers on push to main affecting docs/** or this workflow file, on PRs
# touching the same paths (build only, no deploy), and manual dispatch.
# Lives in its own pipeline so doc edits don't run the SDK / relay /
# frontend CI matrix, and vice versa.
#
# Security: no run: step interpolates untrusted GitHub event input.
# `github.ref` only appears in concurrency.group. Third-party actions are
# pinned by commit SHA — Dependabot keeps them current.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (Astro Starlight)
    runs-on: ubuntu-22.04
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          # Astro 6 requires Node ≥22.12. The frontend CI lane stays on 20.
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: npm ci (docs)
        working-directory: docs
        run: npm ci

      - name: astro build
        working-directory: docs
        run: npm run build

      # actions/configure-pages@v6.0.0
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      # actions/upload-pages-artifact@v5.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: docs/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # actions/deploy-pages@v5.0.0
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
