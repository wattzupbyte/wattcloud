<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wattcloud</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <!-- Loading styles - external for CSP nonce support -->
  <link rel="stylesheet" href="/loading.css">
  <!-- CSP nonce will be applied by backend middleware -->
</head>
<body>
  <div id="app">
    <div class="loading-fallback" id="loading">
      <div class="loading-logo">
        <!-- Cloud vault motif (DESIGN.md §29.1) -->
        <svg viewBox="0 0 48 48" width="72" height="72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M30 7.5 a16.5 16.5 0 0 0 -14.76 9.13 A12 12 0 1 0 13.5 40.5 H30 a16.5 16.5 0 0 0 0 -33 Z" stroke="hsl(142,60%,45%)" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="loading-title">Wattcloud</div>
      <div class="loading-subtitle">Your files, encrypted & secure</div>
      <div class="loading-bar-container">
        <div class="loading-bar"></div>
      </div>
    </div>
  </div>
  <!-- BYO-only application entry — no managed code in this bundle -->
  <script type="module" src="/src/main.ts" crossorigin></script>
  <!-- Loading screen hide logic -->
  <script>
    (function() {
      var loading = document.getElementById('loading');
      var app = document.getElementById('app');

      function hideLoading() {
        if (loading && !loading.classList.contains('fade-out')) {
          loading.classList.add('fade-out');
          setTimeout(function() {
            loading.style.display = 'none';
          }, 400);
        }
      }

      // Check for Svelte app mounting
      var checkInterval = setInterval(function() {
        if (app && app.children.length > 1) {
          clearInterval(checkInterval);
          // Small delay for smooth transition
          setTimeout(hideLoading, 100);
        }
      }, 50);

      // Fallback: hide after 2 seconds max
      setTimeout(hideLoading, 2000);
    })();
  </script>
</body>
</html>
