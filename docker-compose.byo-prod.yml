# BYO production overlay — used with:
#   docker compose -f docker-compose.yml -f docker-compose.byo-prod.yml --profile byo up -d
#
# Applies tighter security, log retention, and healthcheck settings on top of
# the base compose. Does NOT duplicate service definitions — only overrides.

services:
  traefik:
    # Override base log driver: keep only 1 MB for the last log file in prod.
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
    # Re-assert accessLog off and ERROR level via CLI flags so a base-file
    # regression cannot silently re-enable request logging.
    command:
      - "--configFile=/etc/traefik/traefik.yml"
      - "--log.level=ERROR"
      - "--accesslog=false"

  byo-server:
    restart: unless-stopped
    # Tag image with git SHA for rollback: BYO_IMAGE=byo-server:<sha>
    image: ${BYO_IMAGE:-byo-server:local}
    labels:
      # Block /health and /ready from the public internet.
      # The Dockerfile HEALTHCHECK hits 127.0.0.1 directly and never goes via Traefik.
      # Priority 200 beats the base byo router (rule length ~25).
      - "traefik.http.routers.byo-probe-block.rule=Host(`${BYO_DOMAIN}`) && (Path(`/health`) || Path(`/ready`))"
      - "traefik.http.routers.byo-probe-block.entrypoints=websecure"
      - "traefik.http.routers.byo-probe-block.tls=true"
      - "traefik.http.routers.byo-probe-block.tls.certresolver=letsencrypt"
      - "traefik.http.routers.byo-probe-block.service=noop@internal"
      - "traefik.http.routers.byo-probe-block.priority=200"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8443/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        reservations:
          memory: 64M
